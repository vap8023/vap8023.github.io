name: build Gmeek

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  schedule:
    - cron: "0 16 * * *"
    
jobs:
  build:
    name: Generate blog
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id || github.event_name == 'schedule' }}
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Get config.json
        run: |
          echo "====== check config.josn file ======"
          cat config.json
          echo "====== check config.josn end  ======"
          sudo apt-get install jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8

      - name: Clone source code
        run: |
          GMEEK_VERSION=$(jq -r ".GMEEK_VERSION" config.json)
          git clone https://github.com/Meekdai/Gmeek.git /opt/Gmeek;
          cd /opt/Gmeek/
          lastTag=$(git describe --tags `git rev-list --tags --max-count=1`)
          if [ $GMEEK_VERSION == 'last' ]; then git checkout $lastTag; else git checkout $GMEEK_VERSION; fi;

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r /opt/Gmeek/requirements.txt

      - name: Generate new html
        run: |
          cp -r ./* /opt/Gmeek/
          cd /opt/Gmeek/
          # 确保 post 目录存在，避免单独文章修改时 FileNotFoundError
          mkdir -p docs/post
          python Gmeek.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number '${{ github.event.issue.number }}'
          cp -a /opt/Gmeek/docs ${{ github.workspace }}
          cp -a /opt/Gmeek/backup ${{ github.workspace }}
          cp /opt/Gmeek/blogBase.json ${{ github.workspace }} 
          
      - name: Shorten URLs with Hash
        run: |
          cd ${{ github.workspace }}/docs
          set -e

          # 创建短链接目录
          mkdir -p p

          echo "====== URL Shortening Process ======"

          BLOG_BASE="${{ github.workspace }}/blogBase.json"

          # 检查 blogBase.json 是否存在
          if [[ ! -f "$BLOG_BASE" ]]; then
            echo "blogBase.json not found, skipping URL shortening"
            exit 0
          fi

          # 创建映射文件：原文件名 -> hash
          MAP_FILE="/tmp/url_map.txt"
          > "$MAP_FILE"

          # 从 blogBase.json 读取所有文章的 postUrl，提取文件名生成完整映射
          for key in $(jq -r '.postListJson | keys[]' "$BLOG_BASE"); do
            # 获取 postUrl，格式为 "post/filename.html" 或 "p/hash.html"
            post_url=$(jq -r ".postListJson[\"$key\"].postUrl // empty" "$BLOG_BASE")
            if [[ -n "$post_url" && "$post_url" != "null" ]]; then
              # 提取文件名（去掉 post/ 前缀和 .html 后缀）
              if [[ "$post_url" == post/* ]]; then
                filename=$(echo "$post_url" | sed 's|^post/||; s|\.html$||')
              elif [[ "$post_url" == p/* ]]; then
                # 已经是短链接，跳过
                continue
              else
                continue
              fi

              # 获取标题计算 hash
              title=$(jq -r ".postListJson[\"$key\"].postTitle // empty" "$BLOG_BASE")
              if [[ -z "$title" || "$title" == "null" ]]; then
                title="$filename"
              fi
              hash=$(echo -n "$title" | md5sum | cut -c1-8)
              echo "${filename}:${hash}" >> "$MAP_FILE"
            fi
          done

          echo "====== URL Map from blogBase.json ======"
          cat "$MAP_FILE"

          # 处理 post 目录下实际存在的文件
          for html_file in post/*.html; do
            if [[ -f "$html_file" ]]; then
              filename=$(basename "$html_file" .html)
              hash=$(grep "^${filename}:" "$MAP_FILE" | cut -d: -f2)
              if [[ -n "$hash" ]]; then
                cp "$html_file" "p/${hash}.html"
                echo "  Copied: $filename -> p/${hash}.html"
              fi
            fi
          done

          # 删除原 post 目录
          rm -rf post

          echo "====== Updating internal links ======"

          # 更新所有 HTML 中的链接和 blogBase.json
          while IFS=: read -r old_name new_hash; do
            [[ -z "$old_name" ]] && continue
            # URL 编码文件名
            url_encoded_name=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$old_name'))")
            escaped_name=$(printf '%s\n' "$url_encoded_name" | sed 's/[.[\*^$()+?{|\\%]/\\&/g')
            # 更新 HTML 链接
            find . -name "*.html" -type f -exec sed -i "s|post/${escaped_name}\.html|p/${new_hash}.html|g" {} \;
            # 更新 blogBase.json 中的 postUrl
            jq --arg old "post/${old_name}.html" --arg new "p/${new_hash}.html" \
              '(.postListJson[].postUrl | select(. == $old)) = $new' "$BLOG_BASE" > /tmp/blogBase.tmp && mv /tmp/blogBase.tmp "$BLOG_BASE"
          done < "$MAP_FILE"

          echo "====== URL Shortening Complete ======"

      - name: Generate sitemap.xml
        run: |
          cd ${{ github.workspace }}/docs

          # 获取 GitHub Pages URL
          # 如果仓库名是 xxx.github.io 格式，URL 是 https://xxx.github.io/
          # 否则 URL 是 https://xxx.github.io/repo-name/
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *".github.io" ]]; then
            PAGES_URL="https://${{ github.repository_owner }}.github.io"
          else
            PAGES_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}"
          fi

          # 生成 sitemap.xml
          cat > sitemap.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          EOF

          # 添加首页
          echo "  <url><loc>${PAGES_URL}/</loc><priority>1.0</priority></url>" >> sitemap.xml

          # 遍历 HTML 文件生成 URL（保留 .html 后缀）
          find . -name "*.html" -type f | while read file; do
            # 跳过 index.html（已添加）
            if [[ "$file" != "./index.html" ]]; then
              # 转换文件路径为 URL 路径（保留 .html 后缀）
              url_path="${file#./}"
              echo "  <url><loc>${PAGES_URL}/${url_path}</loc></url>" >> sitemap.xml
            fi
          done

          echo "</urlset>" >> sitemap.xml

          echo "====== Generated sitemap.xml ======"
          head -20 sitemap.xml

      - name: update html
        run: |
          git config --local user.email "$(jq -r ".email" config.json)"
          git config --local user.name "${{ github.repository_owner }}"
          git add .
          git commit -a -m '🎉auto update by Gmeek action' || echo "nothing to commit"
          git push || echo "nothing to push"
          sleep 3
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/.'
          
  deploy:
    name: Deploy blog
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
